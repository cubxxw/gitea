# Gitea Workflow Refactor Backend Feature Or Endpoint

## Action

Follow the refactor-backend-feature-or-endpoint workflow:
1. Edit Go source files in modules/, routers/, or services/ to refactor logic or split functions.
2. Update related templates if output or data structure changes.
3. Update or add tests in tests/integration/ or modules/ to cover the refactored logic.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: modules/**/*.go, routers/**/*.go, services/**/*.go

